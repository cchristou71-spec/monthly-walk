<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>The Monthly Walk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#233127;
    --forest:#1F3B2C;
    --sage:#7C9885;
    --sage-soft:#E4EAE2;
    --clay:#C08A3E;
    --clay-soft:#F3E3C6;
    --paper:#F7F5EF;
    --paper-raised:#FFFFFF;
    --line:#DAD9CE;
    --red:#B5533C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    letter-spacing:-0.01em;
  }
  #root{min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:0 16px 80px;}

  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--forest);
    color:var(--paper);
    padding:18px 16px 14px;
    margin:0 -16px 18px;
  }
  .topbar-inner{max-width:640px;margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand svg{flex:none;}
  .brand h1{font-size:22px; margin:0; font-weight:600; color:#fff;}
  .brand p{margin:2px 0 0; font-size:12.5px; color:var(--sage); font-weight:500;}

  .tabs{display:flex; gap:6px; margin-top:14px;}
  .tab{
    flex:1; text-align:center; padding:8px 6px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent;
    color:var(--paper); opacity:0.7; background:rgba(255,255,255,0.06);
    transition:all .15s ease;
  }
  .tab.active{opacity:1; background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.25);}

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-bottom:16px;
  }
  .card + .card{margin-top:0;}

  .eyebrow{
    text-transform:uppercase; font-size:11px; letter-spacing:0.09em;
    color:var(--sage); font-weight:700; margin:0 0 6px;
  }

  .walk-picker{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  select, input[type=text], input[type=date], textarea{
    font-family:'Work Sans', sans-serif;
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 12px;
    font-size:15px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--sage); outline-offset:1px;}
  label{font-size:12.5px; font-weight:600; color:#5b6960; display:block; margin:0 0 4px;}
  .field{margin-bottom:12px;}

  .walk-title{font-size:21px; margin:0 0 2px; font-weight:600;}
  .walk-date{color:var(--clay); font-weight:600; font-size:14px; margin:0 0 12px;}
  .walk-meta{font-size:14px; color:#5b6960; margin:0 0 4px;}
  .walk-details{font-size:14.5px; line-height:1.5; margin-top:10px; white-space:pre-wrap;}

  .stat-row{display:flex; gap:10px; margin:14px 0 2px;}
  .stat{
    flex:1; text-align:center; background:var(--sage-soft); border-radius:10px; padding:10px 6px;
  }
  .stat b{display:block; font-size:20px; font-family:'Fraunces',serif; color:var(--forest);}
  .stat span{font-size:11px; color:#5b6960; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--forest); color:#fff; border:none; border-radius:9px;
    padding:10px 16px; font-size:14.5px; font-weight:600; cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .btn:active{transform:scale(0.98);}
  .btn.secondary{background:transparent; color:var(--forest); border:1px solid var(--line);}
  .btn.danger{background:transparent; color:var(--red); border:1px solid var(--line);}
  .btn.small{padding:7px 12px; font-size:13px;}
  .btn.full{width:100%;}
  .btn-row{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}

  .search{margin-bottom:10px;}

  .member-row{
    display:flex; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .member-row:last-child{border-bottom:none;}
  .member-name{flex:1; font-size:14.5px; font-weight:500;}
  .toggle-group{display:flex; gap:5px;}
  .toggle{
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:#fff; display:flex; align-items:center; justify-content:center;
    font-size:15px; cursor:pointer; color:#b9c0b6; transition:all .12s ease;
  }
  .toggle.on{background:var(--forest); border-color:var(--forest); color:#fff;}
  .toggle.on.lunch{background:var(--clay); border-color:var(--clay);}
  .toggle.on.drive{background:#4C6E8C; border-color:#4C6E8C;}

  .legend{display:flex; gap:14px; font-size:12px; color:#5b6960; margin-bottom:14px; flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .dot{width:10px; height:10px; border-radius:3px; display:inline-block;}

  .empty{
    text-align:center; padding:34px 18px; color:#5b6960; font-size:14px;
  }
  .empty .display{font-size:19px; color:var(--forest); margin-bottom:6px;}

  .hist-item{
    padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .hist-item:last-child{border-bottom:none;}
  .hist-item h3{margin:0 0 3px; font-size:15.5px;}
  .hist-item p{margin:0; font-size:12.5px; color:#5b6960;}

  .close-x{
    background:none; border:none; font-size:20px; color:#8a9089; cursor:pointer; line-height:1;
  }
  .row-between{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--forest); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13.5px; font-weight:600; z-index:50; box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }
  .loading{text-align:center; padding:60px 20px; color:#5b6960;}

  .toggle.locked{cursor:not-allowed; opacity:0.4;}
  .member-row.locked .member-name{color:#9aa39a;}
  .whoami{
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,0.08); border-radius:9px; padding:8px 12px; margin-top:12px;
    font-size:12.5px; color:var(--paper);
  }
  .whoami b{color:#fff;}
  .whoami button{
    background:none; border:none; color:var(--sage); font-size:12px; font-weight:700;
    cursor:pointer; text-decoration:underline; padding:0;
  }
  .identity-modal{
    position:fixed; inset:0; background:rgba(31,59,44,0.55); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .identity-card{
    background:#fff; border-radius:16px; padding:24px; max-width:380px; width:100%;
    max-height:80vh; display:flex; flex-direction:column;
  }
  .identity-list{overflow-y:auto; margin:14px 0; flex:1;}
  .identity-option{
    padding:11px 12px; border-radius:9px; font-size:14.5px; cursor:pointer; font-weight:500;
  }
  .identity-option:hover{background:var(--sage-soft);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useCallback } = React;

const SUPABASE_URL = "https://lpfifbhoglnlrntfqjxq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZmlmYmhvZ2xubHJudGZxanhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTkzMzMsImV4cCI6MjA5MzU5NTMzM30.slcTjntVCrhpo07mkstwQvdWfm-L046Ej1tZe2TF5LI";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function fmtDateShort(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function CompassMark() {
  return (
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <circle cx="15" cy="15" r="13" stroke="#7C9885" strokeWidth="1.4" />
      <path d="M15 5 L18 15 L15 25 L12 15 Z" fill="#C08A3E" />
      <circle cx="15" cy="15" r="2" fill="#F7F5EF" />
    </svg>
  );
}

function Toast({ text }) {
  if (!text) return null;
  return <div className="toast">{text}</div>;
}

function IdentityModal({ members, onPick }) {
  const [q, setQ] = useState('');
  const filtered = members.filter(m => m.name.toLowerCase().includes(q.trim().toLowerCase()));
  return (
    <div className="identity-modal">
      <div className="identity-card">
        <h2 style={{margin:'0 0 4px', fontSize:19}}>Which one are you?</h2>
        <p style={{margin:0, fontSize:13, color:'#5b6960'}}>So you can tick your own name. This is just remembered on this device — not a real login.</p>
        <input type="text" placeholder="Search…" value={q} onChange={e => setQ(e.target.value)} style={{marginTop:12}} />
        <div className="identity-list">
          {filtered.map(m => (
            <div className="identity-option" key={m.id} onClick={() => onPick(m.name)}>{m.name}</div>
          ))}
          {filtered.length === 0 && <div style={{padding:'10px 12px', fontSize:13.5, color:'#8a9089'}}>No match. Add yourself from the Members tab first.</div>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [members, setMembers] = useState([]);
  const [events, setEvents] = useState([]);
  const [signups, setSignups] = useState([]);
  const [selectedEventId, setSelectedEventId] = useState(null);
  const [tab, setTab] = useState('walk'); // walk | history | members
  const [search, setSearch] = useState('');
  const [showNewWalk, setShowNewWalk] = useState(false);
  const [editingWalk, setEditingWalk] = useState(false);
  const [form, setForm] = useState({ walk_date: '', title: '', organiser: '', details: '' });
  const [newMemberName, setNewMemberName] = useState('');
  const [newMemberEmail, setNewMemberEmail] = useState('');
  const [toast, setToast] = useState('');
  const [myName, setMyName] = useState(() => localStorage.getItem('walkgroup_identity') || '');
  const [showIdentity, setShowIdentity] = useState(false);

  const pickIdentity = (name) => {
    localStorage.setItem('walkgroup_identity', name);
    setMyName(name);
    setShowIdentity(false);
  };

  const flashToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1800); };

  const loadAll = useCallback(async () => {
    const [mRes, eRes] = await Promise.all([
      sb.from('walk_members').select('id,name,active,created_at').order('name'),
      sb.from('walk_events').select('*').order('walk_date', { ascending: false }),
    ]);
    if (mRes.data) setMembers(mRes.data);
    if (eRes.data) {
      setEvents(eRes.data);
      if (eRes.data.length && !selectedEventId) {
        const today = new Date().toISOString().slice(0, 10);
        const upcoming = eRes.data.filter(e => e.walk_date >= today).sort((a, b) => a.walk_date.localeCompare(b.walk_date));
        setSelectedEventId(upcoming.length ? upcoming[0].id : eRes.data[0].id);
      }
    }
    setLoading(false);
  }, [selectedEventId]);

  useEffect(() => { loadAll(); }, []);

  useEffect(() => {
    if (!myName && members.length > 0 && !loading) setShowIdentity(true);
  }, [members, myName, loading]);

  const loadSignups = useCallback(async (eventId) => {
    if (!eventId) { setSignups([]); return; }
    const { data } = await sb.from('walk_signups').select('*').eq('event_id', eventId);
    setSignups(data || []);
  }, []);

  useEffect(() => { loadSignups(selectedEventId); }, [selectedEventId]);

  const selectedEvent = useMemo(() => events.find(e => e.id === selectedEventId), [events, selectedEventId]);

  const signupFor = useCallback((name) => signups.find(s => s.member_name === name), [signups]);

  const isOrganiserOfSelected = useMemo(() => {
    if (!selectedEvent || !selectedEvent.organiser || !myName) return false;
    return selectedEvent.organiser.trim().toLowerCase() === myName.trim().toLowerCase();
  }, [selectedEvent, myName]);

  const canEditRow = useCallback((memberName) => {
    if (!myName) return false;
    if (memberName.trim().toLowerCase() === myName.trim().toLowerCase()) return true;
    return isOrganiserOfSelected;
  }, [myName, isOrganiserOfSelected]);

  const toggleFlag = async (memberName, flag) => {
    if (!canEditRow(memberName)) {
      flashToast(myName ? `Only ${memberName} or this walk's organiser can update that` : 'Pick who you are first');
      return;
    }
    const existing = signupFor(memberName);
    const nextVal = existing ? !existing[flag] : true;
    const payload = {
      event_id: selectedEventId,
      member_name: memberName,
      going_walk: existing ? existing.going_walk : false,
      going_lunch: existing ? existing.going_lunch : false,
      driving: existing ? existing.driving : false,
      updated_at: new Date().toISOString(),
    };
    payload[flag] = nextVal;
    setSignups(prev => {
      const others = prev.filter(s => s.member_name !== memberName);
      return [...others, { ...(existing || {}), ...payload }];
    });
    await sb.from('walk_signups').upsert(payload, { onConflict: 'event_id,member_name' });
  };

  const activeMembers = useMemo(() => members.filter(m => m.active !== false), [members]);
  const filteredMembers = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return activeMembers;
    return activeMembers.filter(m => m.name.toLowerCase().includes(q));
  }, [activeMembers, search]);

  const counts = useMemo(() => {
    let walk = 0, lunch = 0, drive = 0;
    signups.forEach(s => { if (s.going_walk) walk++; if (s.going_lunch) lunch++; if (s.driving) drive++; });
    return { walk, lunch, drive };
  }, [signups]);

  const openNewWalk = () => {
    setForm({ walk_date: '', title: '', organiser: '', details: '' });
    setEditingWalk(false);
    setShowNewWalk(true);
  };
  const openEditWalk = () => {
    if (!selectedEvent) return;
    setForm({
      walk_date: selectedEvent.walk_date, title: selectedEvent.title || '',
      organiser: selectedEvent.organiser || '', details: selectedEvent.details || '',
    });
    setEditingWalk(true);
    setShowNewWalk(true);
  };

  const saveWalk = async () => {
    if (!form.walk_date) { flashToast('Pick a date first'); return; }
    if (editingWalk && selectedEvent) {
      const { error } = await sb.from('walk_events').update({
        walk_date: form.walk_date, title: form.title, organiser: form.organiser,
        details: form.details, updated_at: new Date().toISOString(),
      }).eq('id', selectedEvent.id);
      if (!error) flashToast('Walk updated');
    } else {
      const { data, error } = await sb.from('walk_events').insert({
        walk_date: form.walk_date, title: form.title, organiser: form.organiser, details: form.details,
      }).select().single();
      if (!error && data) { setSelectedEventId(data.id); flashToast('Walk added'); }
    }
    setShowNewWalk(false);
    loadAll();
  };

  const deleteWalk = async () => {
    if (!selectedEvent) return;
    if (!window.confirm(`Delete the ${fmtDateShort(selectedEvent.walk_date)} walk? This removes everyone's RSVPs too.`)) return;
    await sb.from('walk_events').delete().eq('id', selectedEvent.id);
    setSelectedEventId(null);
    setShowNewWalk(false);
    flashToast('Walk deleted');
    loadAll();
  };

  const addMember = async () => {
    const name = newMemberName.trim();
    if (!name) return;
    const email = newMemberEmail.trim();
    const { error } = await sb.from('walk_members').insert({ name, email: email || null });
    if (error) { flashToast(error.message.includes('duplicate') ? 'Already on the list' : 'Could not add'); return; }
    setNewMemberName('');
    setNewMemberEmail('');
    flashToast('Added to the group');
    loadAll();
  };

  const removeMember = async (m) => {
    if (!window.confirm(`Remove ${m.name} from the group list?`)) return;
    await sb.from('walk_members').delete().eq('id', m.id);
    flashToast('Removed');
    loadAll();
  };

  const [editingMemberId, setEditingMemberId] = useState(null);
  const [editingMemberName, setEditingMemberName] = useState('');
  const [editingMemberEmail, setEditingMemberEmail] = useState('');

  const startEditMember = (m) => {
    setEditingMemberId(m.id);
    setEditingMemberName(m.name);
    setEditingMemberEmail('');
  };

  const cancelEditMember = () => {
    setEditingMemberId(null);
    setEditingMemberName('');
    setEditingMemberEmail('');
  };

  const saveEditMember = async (m) => {
    const newName = editingMemberName.trim();
    if (!newName) { flashToast('Name can\'t be empty'); return; }
    const emailTrimmed = editingMemberEmail.trim();
    const updates = { name: newName };
    if (emailTrimmed) updates.email = emailTrimmed;
    if (newName === m.name && !emailTrimmed) { cancelEditMember(); return; }
    const { error } = await sb.from('walk_members').update(updates).eq('id', m.id);
    if (error) { flashToast(error.message.includes('duplicate') ? 'Already on the list' : 'Could not save'); return; }
    if (newName !== m.name) {
      // Keep past RSVPs matched to the renamed person
      await sb.from('walk_signups').update({ member_name: newName }).eq('member_name', m.name);
      if (myName === m.name) { localStorage.setItem('walkgroup_identity', newName); setMyName(newName); }
    }
    cancelEditMember();
    flashToast('Saved');
    loadAll();
    loadSignups(selectedEventId);
  };

  if (loading) return <div className="app"><div className="loading">Loading the walk book…</div></div>;

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <CompassMark />
            <div>
              <h1>The Monthly Walk</h1>
              <p>{activeMembers.length} in the group</p>
            </div>
          </div>
          <div className="tabs">
            <div className={"tab" + (tab === 'walk' ? ' active' : '')} onClick={() => setTab('walk')}>This walk</div>
            <div className={"tab" + (tab === 'history' ? ' active' : '')} onClick={() => setTab('history')}>All walks</div>
            <div className={"tab" + (tab === 'members' ? ' active' : '')} onClick={() => setTab('members')}>Members</div>
          </div>
          <div className="whoami">
            <span>{myName ? <React.Fragment>Signed in as <b>{myName}</b></React.Fragment> : 'Not signed in'}</span>
            <button onClick={() => setShowIdentity(true)}>{myName ? 'Switch' : 'Pick who you are'}</button>
          </div>
        </div>
      </div>

      {showIdentity && <IdentityModal members={activeMembers} onPick={pickIdentity} />}

      {tab === 'walk' && (
        <React.Fragment>
          {events.length > 0 && (
            <div className="walk-picker">
              <select value={selectedEventId || ''} onChange={e => setSelectedEventId(e.target.value)}>
                {events.map(e => (
                  <option key={e.id} value={e.id}>
                    {fmtDateShort(e.walk_date)}{e.title ? ' — ' + e.title : ''}
                  </option>
                ))}
              </select>
              <button className="btn small secondary" onClick={openNewWalk}>+ New</button>
            </div>
          )}

          {!selectedEvent && (
            <div className="card empty">
              <div className="display">No walk on the books yet</div>
              <p>Add next month's date, route and organiser to get started.</p>
              <button className="btn full" style={{marginTop:14}} onClick={openNewWalk}>Add a walk</button>
            </div>
          )}

          {selectedEvent && !showNewWalk && (
            <React.Fragment>
              <div className="card">
                <div className="row-between">
                  <div className="eyebrow">Monthly walk</div>
                  <button className="btn small secondary" onClick={openEditWalk}>Edit</button>
                </div>
                <h2 className="walk-title">{selectedEvent.title || 'Group walk'}</h2>
                <p className="walk-date">{fmtDate(selectedEvent.walk_date)}</p>
                {selectedEvent.organiser && <p className="walk-meta">Organised by <b>{selectedEvent.organiser}</b></p>}
                {selectedEvent.details && <p className="walk-details">{selectedEvent.details}</p>}
                <div className="stat-row">
                  <div className="stat"><b>{counts.walk}</b><span>Walking</span></div>
                  <div className="stat"><b>{counts.lunch}</b><span>Lunch</span></div>
                  <div className="stat"><b>{counts.drive}</b><span>Driving</span></div>
                </div>
              </div>

              <div className="card">
                <div className="eyebrow">Who's in</div>
                <input className="search" type="text" placeholder="Find your name…" value={search} onChange={e => setSearch(e.target.value)} />
                <div className="legend">
                  <span><span className="dot" style={{background:'#1F3B2C'}}></span>Walk</span>
                  <span><span className="dot" style={{background:'#C08A3E'}}></span>Lunch</span>
                  <span><span className="dot" style={{background:'#4C6E8C'}}></span>Driving</span>
                </div>
                {filteredMembers.length === 0 && <div className="empty">No members match. Add people from the Members tab.</div>}
                {filteredMembers.map(m => {
                  const s = signupFor(m.name);
                  const editable = canEditRow(m.name);
                  return (
                    <div className={"member-row" + (editable ? '' : ' locked')} key={m.id}>
                      <div className="member-name">{m.name}{!editable && ' 🔒'}</div>
                      <div className="toggle-group">
                        <div className={"toggle" + (s && s.going_walk ? ' on' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'going_walk')} title="Walk">W</div>
                        <div className={"toggle" + (s && s.going_lunch ? ' on lunch' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'going_lunch')} title="Lunch">L</div>
                        <div className={"toggle" + (s && s.driving ? ' on drive' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'driving')} title="Driving">D</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </React.Fragment>
          )}

          {showNewWalk && (
            <div className="card">
              <div className="row-between">
                <div className="eyebrow">{editingWalk ? 'Edit walk' : 'New walk'}</div>
                <button className="close-x" onClick={() => setShowNewWalk(false)}>×</button>
              </div>
              <div className="field">
                <label>Date</label>
                <input type="date" value={form.walk_date} onChange={e => setForm({ ...form, walk_date: e.target.value })} />
              </div>
              <div className="field">
                <label>Title (optional)</label>
                <input type="text" placeholder="e.g. Coastal path circuit" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} />
              </div>
              <div className="field">
                <label>Organiser</label>
                <input type="text" placeholder="Who's leading this one?" value={form.organiser} onChange={e => setForm({ ...form, organiser: e.target.value })} />
              </div>
              <div className="field">
                <label>Details</label>
                <textarea rows="4" placeholder="Route, meeting point, pub for lunch…" value={form.details} onChange={e => setForm({ ...form, details: e.target.value })} />
              </div>
              <div className="btn-row">
                <button className="btn" onClick={saveWalk}>{editingWalk ? 'Save changes' : 'Add walk'}</button>
                <button className="btn secondary" onClick={() => setShowNewWalk(false)}>Cancel</button>
                {editingWalk && <button className="btn danger" onClick={deleteWalk}>Delete walk</button>}
              </div>
            </div>
          )}
        </React.Fragment>
      )}

      {tab === 'history' && (
        <div className="card">
          <div className="eyebrow">Every walk logged</div>
          {events.length === 0 && <div className="empty">Nothing logged yet.</div>}
          {events.map(e => (
            <div className="hist-item" key={e.id} onClick={() => { setSelectedEventId(e.id); setTab('walk'); }}>
              <h3>{fmtDateShort(e.walk_date)}{e.title ? ' — ' + e.title : ''}</h3>
              <p>{e.organiser ? 'Organised by ' + e.organiser : 'No organiser set'}</p>
            </div>
          ))}
        </div>
      )}

      {tab === 'members' && (
        <div className="card">
          <div className="eyebrow">Group list</div>
          <div className="field" style={{display:'flex', gap:8, marginTop:8, flexWrap:'wrap'}}>
            <input type="text" placeholder="Add a name…" value={newMemberName}
              onChange={e => setNewMemberName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addMember(); }}
              style={{flex:'1 1 140px'}} />
            <input type="text" placeholder="Email (optional)" value={newMemberEmail}
              onChange={e => setNewMemberEmail(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addMember(); }}
              style={{flex:'1 1 160px'}} />
            <button className="btn small" onClick={addMember}>Add</button>
          </div>
          <p style={{fontSize:12, color:'#8a9089', margin:'0 0 10px'}}>Emails are stored but never shown or readable through the app — write-only, for future reminders.</p>
          {members.length === 0 && <div className="empty">No one on the list yet — add the group above.</div>}
          {members.map(m => (
            <div className="member-row" key={m.id}>
              {editingMemberId === m.id ? (
                <React.Fragment>
                  <div style={{display:'flex', flexDirection:'column', gap:6, flex:1}}>
                    <input type="text" value={editingMemberName}
                      onChange={e => setEditingMemberName(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Escape') cancelEditMember(); }}
                      autoFocus placeholder="Name" />
                    <input type="text" value={editingMemberEmail}
                      onChange={e => setEditingMemberEmail(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') saveEditMember(m); if (e.key === 'Escape') cancelEditMember(); }}
                      placeholder="Update email (optional, write-only)" />
                  </div>
                  <button className="btn small" onClick={() => saveEditMember(m)}>Save</button>
                  <button className="btn small secondary" onClick={cancelEditMember}>Cancel</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="member-name">{m.name}</div>
                  <button className="btn small secondary" onClick={() => startEditMember(m)}>Edit</button>
                  <button className="btn small danger" onClick={() => removeMember(m)}>Remove</button>
                </React.Fragment>
              )}
            </div>
          ))}
        </div>
      )}

      <Toast text={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
