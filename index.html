<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>HDSG Walks</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1F3B2C">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#233127;
    --forest:#1F3B2C;
    --sage:#7C9885;
    --sage-soft:#E4EAE2;
    --clay:#C08A3E;
    --clay-soft:#F3E3C6;
    --paper:#F7F5EF;
    --paper-raised:#FFFFFF;
    --line:#DAD9CE;
    --red:#B5533C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    letter-spacing:-0.01em;
  }
  #root{min-height:100vh;}
  .app{max-width:640px;margin:0 auto;padding:0 16px 80px;}

  .topbar{
    position:sticky; top:0; z-index:10;
    background:var(--forest);
    color:var(--paper);
    padding:18px 16px 14px;
    margin:0 -16px 18px;
  }
  .topbar-inner{max-width:640px;margin:0 auto;}
  .brand{display:flex; align-items:center; gap:10px;}
  .brand svg{flex:none;}
  .brand h1{font-size:22px; margin:0; font-weight:600; color:#fff;}
  .brand p{margin:2px 0 0; font-size:12.5px; color:var(--sage); font-weight:500;}

  .tabs{display:flex; gap:6px; margin-top:14px;}
  .tab{
    flex:1; text-align:center; padding:8px 6px; border-radius:8px;
    font-size:13px; font-weight:600; cursor:pointer; border:1px solid transparent;
    color:var(--paper); opacity:0.7; background:rgba(255,255,255,0.06);
    transition:all .15s ease;
  }
  .tab.active{opacity:1; background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.25);}

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:14px;
    padding:18px;
    margin-bottom:16px;
  }
  .card + .card{margin-top:0;}

  .eyebrow{
    text-transform:uppercase; font-size:11px; letter-spacing:0.09em;
    color:var(--sage); font-weight:700; margin:0 0 6px;
  }

  .walk-picker{display:flex; align-items:center; gap:10px; margin-bottom:16px;}
  select, input[type=text], input[type=date], textarea{
    font-family:'Work Sans', sans-serif;
    border:1px solid var(--line);
    border-radius:9px;
    padding:10px 12px;
    font-size:15px;
    background:#fff;
    color:var(--ink);
    width:100%;
  }
  select:focus, input:focus, textarea:focus{outline:2px solid var(--sage); outline-offset:1px;}
  label{font-size:12.5px; font-weight:600; color:#5b6960; display:block; margin:0 0 4px;}
  .field{margin-bottom:12px;}

  .walk-title{font-size:21px; margin:0 0 2px; font-weight:600;}
  .walk-date{color:var(--clay); font-weight:600; font-size:14px; margin:0 0 12px;}
  .walk-meta{font-size:14px; color:#5b6960; margin:0 0 4px;}
  .walk-details{font-size:14.5px; line-height:1.5; margin-top:10px; white-space:pre-wrap;}

  .stat-row{display:flex; gap:10px; margin:14px 0 2px;}
  .stat{
    flex:1; text-align:center; background:var(--sage-soft); border-radius:10px; padding:10px 6px;
  }
  .stat b{display:block; font-size:20px; font-family:'Fraunces',serif; color:var(--forest);}
  .stat span{font-size:11px; color:#5b6960; font-weight:600; text-transform:uppercase; letter-spacing:0.04em;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    background:var(--forest); color:#fff; border:none; border-radius:9px;
    padding:10px 16px; font-size:14.5px; font-weight:600; cursor:pointer;
    font-family:'Work Sans', sans-serif;
  }
  .btn:active{transform:scale(0.98);}
  .btn.secondary{background:transparent; color:var(--forest); border:1px solid var(--line);}
  .btn.danger{background:transparent; color:var(--red); border:1px solid var(--line);}
  .btn.small{padding:7px 12px; font-size:13px;}
  .btn.full{width:100%;}
  .btn-row{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}

  .search{margin-bottom:10px;}

  .member-row{
    display:flex; align-items:center; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .member-row:last-child{border-bottom:none;}
  .member-name{flex:1; font-size:14.5px; font-weight:500;}
  .toggle-group{display:flex; gap:5px;}
  .toggle{
    width:34px; height:34px; border-radius:8px; border:1px solid var(--line);
    background:#fff; display:flex; align-items:center; justify-content:center;
    font-size:15px; cursor:pointer; color:#b9c0b6; transition:all .12s ease;
  }
  .toggle.on{background:var(--forest); border-color:var(--forest); color:#fff;}
  .toggle.on.lunch{background:var(--clay); border-color:var(--clay);}
  .toggle.on.drive{background:#4C6E8C; border-color:#4C6E8C;}

  .legend{display:flex; gap:14px; font-size:12px; color:#5b6960; margin-bottom:14px; flex-wrap:wrap;}
  .legend span{display:flex; align-items:center; gap:5px;}
  .dot{width:10px; height:10px; border-radius:3px; display:inline-block;}

  .empty{
    text-align:center; padding:34px 18px; color:#5b6960; font-size:14px;
  }
  .empty .display{font-size:19px; color:var(--forest); margin-bottom:6px;}

  .hist-item{
    padding:12px 0; border-bottom:1px solid var(--line); cursor:pointer;
  }
  .hist-item:last-child{border-bottom:none;}
  .hist-item h3{margin:0 0 3px; font-size:15.5px;}
  .hist-item p{margin:0; font-size:12.5px; color:#5b6960;}

  .close-x{
    background:none; border:none; font-size:20px; color:#8a9089; cursor:pointer; line-height:1;
  }
  .row-between{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}

  .toast{
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    background:var(--forest); color:#fff; padding:10px 18px; border-radius:20px;
    font-size:13.5px; font-weight:600; z-index:50; box-shadow:0 4px 16px rgba(0,0,0,0.2);
  }
  .loading{text-align:center; padding:60px 20px; color:#5b6960;}

  .toggle.locked{cursor:not-allowed; opacity:0.4;}
  .member-row.locked .member-name{color:#9aa39a;}
  .whoami{
    display:flex; align-items:center; justify-content:space-between;
    background:rgba(255,255,255,0.08); border-radius:9px; padding:8px 12px; margin-top:12px;
    font-size:12.5px; color:var(--paper);
  }
  .whoami b{color:#fff;}
  .whoami button{
    background:none; border:none; color:var(--sage); font-size:12px; font-weight:700;
    cursor:pointer; text-decoration:underline; padding:0;
  }
  .identity-modal{
    position:fixed; inset:0; background:rgba(31,59,44,0.55); z-index:60;
    display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .identity-card{
    background:#fff; border-radius:16px; padding:24px; max-width:380px; width:100%;
    max-height:80vh; display:flex; flex-direction:column;
  }
  .identity-list{overflow-y:auto; margin:14px 0; flex:1;}
  .identity-option{
    padding:11px 12px; border-radius:9px; font-size:14.5px; cursor:pointer; font-weight:500;
  }
  .identity-option:hover{background:var(--sage-soft);}

  .organiser-list{
    max-height:180px; overflow-y:auto; border:1px solid var(--line); border-radius:9px; padding:6px 4px;
  }
  .organiser-option{
    display:flex; align-items:center; gap:8px; padding:7px 8px; font-size:14px; font-weight:500;
    border-radius:7px; cursor:pointer;
  }
  .organiser-option:hover{background:var(--sage-soft);}
  .organiser-option input{width:16px; height:16px; flex:none;}

  .coord-grid{display:grid; grid-template-columns:1fr 1fr; gap:8px;}

  .route-links{display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;}
  .link-chip{
    display:inline-flex; align-items:center; gap:4px;
    background:var(--sage-soft); color:var(--forest); text-decoration:none;
    font-size:13px; font-weight:600; padding:6px 12px; border-radius:20px;
  }
  .lunch-chip{
    display:inline-flex; align-items:center; gap:4px; margin-top:10px;
    background:var(--clay-soft); color:#7a4f18; font-size:13.5px; font-weight:600;
    padding:7px 12px; border-radius:10px;
  }
  .lunch-chip a{color:#7a4f18; text-decoration:underline;}

  .route-map{height:260px; border-radius:12px; margin-top:10px; border:1px solid var(--line); z-index:0; touch-action:none;}
  .map-style-toggle{
    position:absolute; top:18px; right:8px; z-index:1000; display:flex;
    background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }
  .map-style-toggle button{
    border:none; background:#fff; padding:6px 11px; font-size:11.5px; font-weight:700; cursor:pointer; color:#5b6960;
  }
  .map-style-toggle button.active{background:var(--forest); color:#fff;}

  .location-toggle-btn{
    position:absolute; top:18px; left:8px; z-index:1000;
    background:#fff; border:none; border-radius:8px; padding:6px 11px;
    font-size:11.5px; font-weight:700; cursor:pointer; color:#5b6960;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }
  .location-toggle-btn.active{background:#2B7DE9; color:#fff;}

  .expand-btn{
    position:absolute; top:56px; right:8px; z-index:1000;
    background:#fff; border:none; border-radius:8px; padding:6px 11px;
    font-size:11.5px; font-weight:700; cursor:pointer; color:#5b6960;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }

  .fullscreen-map-modal{
    position:fixed; inset:0; z-index:2000; background:#fff;
    display:flex; flex-direction:column;
  }
  .fullscreen-map-header{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; background:var(--forest); color:#fff; font-weight:700; font-size:15px;
    padding-top:calc(16px + env(safe-area-inset-top, 0px));
  }
  .fullscreen-map-header .close-x{color:#fff; font-size:28px;}
  .fullscreen-map-body{position:relative; flex:1; min-height:0;}
  .fullscreen-map-container{position:absolute; inset:0; touch-action:none;}
  .fs-location-error{
    position:absolute; bottom:12px; left:8px; right:8px; z-index:1000;
    background:#fff; color:var(--red); font-size:12.5px; font-weight:600;
    padding:8px 12px; border-radius:8px; box-shadow:0 2px 6px rgba(0,0,0,0.2);
  }
  .gpx-attach{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:var(--sage-soft); border-radius:9px; padding:9px 12px; font-size:13.5px; font-weight:600;
  }
  .gpx-attach button{background:none; border:none; color:var(--red); font-size:12.5px; font-weight:700; cursor:pointer; text-decoration:underline; padding:0;}

  .level-block{border-top:1px solid var(--line); padding-top:12px; margin-top:12px;}
  .level-block:first-child{border-top:none; margin-top:0; padding-top:0;}
  .level-name{font-size:15px; font-weight:700;}
  .level-name.easy{color:#3D7A5A;}
  .level-name.medium{color:var(--clay);}
  .level-name.hard{color:var(--red);}

  .day-header{display:flex; align-items:center; justify-content:space-between; cursor:pointer; gap:10px;}
  .chevron{font-size:18px; color:#8a9089; line-height:1; flex:none;}
  .chevron.small{font-size:14px;}
  .level-header{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  .level-header-left{display:flex; align-items:center; gap:8px; flex:1; cursor:pointer; min-width:0;}
  .no-route-tag{font-size:11px; font-weight:600; color:#b9c0b6;}

  .level-choice-group{display:flex; gap:5px;}
  .level-chip{
    min-width:34px; height:34px; padding:0 8px; border-radius:8px; border:1px solid var(--line);
    background:#fff; display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:700; cursor:pointer; color:#b9c0b6;
  }
  .level-chip.locked{cursor:not-allowed; opacity:0.4;}
  .level-chip.active.easy{background:#3D7A5A; border-color:#3D7A5A; color:#fff;}
  .level-chip.active.medium{background:var(--clay); border-color:var(--clay); color:#fff;}
  .level-chip.active.hard{background:var(--red); border-color:var(--red); color:#fff;}
  .level-chip.active.notwalking{background:#8a9089; border-color:#8a9089; color:#fff;}

  .day-summary{display:flex; gap:8px; flex-wrap:wrap; margin:8px 0 4px;}
  .day-summary span{
    font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:20px; background:var(--sage-soft); color:var(--forest);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/plain" id="app-source">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SUPABASE_URL = "https://lpfifbhoglnlrntfqjxq.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxwZmlmYmhvZ2xubHJudGZxanhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMTkzMzMsImV4cCI6MjA5MzU5NTMzM30.slcTjntVCrhpo07mkstwQvdWfm-L046Ej1tZe2TF5LI";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

if (window.L) {
  delete L.Icon.Default.prototype._getIconUrl;
  L.Icon.Default.mergeOptions({
    iconRetinaUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon-2x.png',
    iconUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-icon.png',
    shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
  });
}

function toMapsLink(value) {
  if (!value) return null;
  const trimmed = value.trim();
  if (!trimmed) return null;
  if (/^https?:\/\//i.test(trimmed)) return trimmed;
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(trimmed)}`;
}

function parseGpxPoints(gpxText) {
  if (!gpxText) return [];
  try {
    const doc = new DOMParser().parseFromString(gpxText, 'application/xml');
    if (doc.querySelector('parsererror')) return [];
    let nodes = Array.from(doc.getElementsByTagName('trkpt'));
    if (nodes.length === 0) nodes = Array.from(doc.getElementsByTagName('rtept'));
    return nodes
      .map(n => ({ lat: parseFloat(n.getAttribute('lat')), lng: parseFloat(n.getAttribute('lon')) }))
      .filter(p => !isNaN(p.lat) && !isNaN(p.lng));
  } catch (e) {
    return [];
  }
}

function buildLeafletMap(container, points, mapStyle) {
  const map = L.map(container, { scrollWheelZoom: false, touchZoom: true, tap: true, bounceAtZoomLimits: false, zoomControl: false });
  L.control.zoom({ position: 'bottomleft' }).addTo(map);
  const isTopo = mapStyle === 'topo';
  const tileUrl = isTopo
    ? 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
    : 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png';
  const attribution = isTopo
    ? 'Map data: &copy; OpenStreetMap contributors, SRTM | Map style: &copy; OpenTopoMap (CC-BY-SA)'
    : '&copy; OpenStreetMap contributors';
  L.tileLayer(tileUrl, { maxZoom: isTopo ? 17 : 19, attribution }).addTo(map);
  const latlngs = points.map(p => [p.lat, p.lng]);
  const line = L.polyline(latlngs, { color: '#C08A3E', weight: 4 }).addTo(map);
  L.marker(latlngs[0]).addTo(map).bindPopup('Start');
  L.marker(latlngs[latlngs.length - 1]).addTo(map).bindPopup('End');
  map.fitBounds(line.getBounds(), { padding: [20, 20] });
  return map;
}

function toggleLocationTracking(isOn, watchIdRef, markerRef, mapRef, setOn, setError) {
  if (isOn) {
    if (watchIdRef.current != null && navigator.geolocation) navigator.geolocation.clearWatch(watchIdRef.current);
    watchIdRef.current = null;
    setOn(false);
    return;
  }
  if (!navigator.geolocation) { setError('Location is not supported on this device'); return; }
  setError(null);
  const id = navigator.geolocation.watchPosition(
    (pos) => {
      const { latitude, longitude } = pos.coords;
      if (!mapRef.current) return;
      if (!markerRef.current) {
        markerRef.current = L.circleMarker([latitude, longitude], {
          radius: 8, color: '#2B7DE9', fillColor: '#2B7DE9', fillOpacity: 0.9, weight: 2,
        }).addTo(mapRef.current).bindPopup('You');
      } else {
        markerRef.current.setLatLng([latitude, longitude]);
      }
    },
    (err) => { setError(err.message || 'Could not get your location'); setOn(false); },
    { enableHighAccuracy: true, maximumAge: 5000, timeout: 15000 }
  );
  watchIdRef.current = id;
  setOn(true);
}

function MapControls({ mapStyle, setMapStyle, locationOn, toggleLocation, expandBtn }) {
  return (
    <React.Fragment>
      <button className={"location-toggle-btn" + (locationOn ? ' active' : '')} onClick={toggleLocation}>
        📍 {locationOn ? 'Stop' : 'My location'}
      </button>
      <div className="map-style-toggle">
        <button className={mapStyle === 'street' ? 'active' : ''} onClick={() => setMapStyle('street')}>Street</button>
        <button className={mapStyle === 'topo' ? 'active' : ''} onClick={() => setMapStyle('topo')}>Topo</button>
      </div>
      {expandBtn}
    </React.Fragment>
  );
}

function RouteMap({ gpxContent }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const watchIdRef = useRef(null);
  const locationMarkerRef = useRef(null);
  const [mapStyle, setMapStyle] = useState('street');
  const [locationOn, setLocationOn] = useState(false);
  const [locationError, setLocationError] = useState(null);
  const [fullscreen, setFullscreen] = useState(false);

  const fsContainerRef = useRef(null);
  const fsMapRef = useRef(null);
  const fsWatchIdRef = useRef(null);
  const fsLocationMarkerRef = useRef(null);
  const [fsLocationOn, setFsLocationOn] = useState(false);
  const [fsLocationError, setFsLocationError] = useState(null);

  const points = useMemo(() => parseGpxPoints(gpxContent), [gpxContent]);

  useEffect(() => {
    if (!containerRef.current || points.length === 0 || !window.L) return;
    const map = buildLeafletMap(containerRef.current, points, mapStyle);
    mapRef.current = map;
    return () => {
      if (watchIdRef.current != null && navigator.geolocation) { navigator.geolocation.clearWatch(watchIdRef.current); watchIdRef.current = null; }
      locationMarkerRef.current = null;
      mapRef.current = null;
      setLocationOn(false);
      map.remove();
    };
  }, [points, mapStyle]);

  useEffect(() => {
    if (!fullscreen || !fsContainerRef.current || points.length === 0 || !window.L) return;
    const map = buildLeafletMap(fsContainerRef.current, points, mapStyle);
    fsMapRef.current = map;
    setTimeout(() => map.invalidateSize(), 60);
    document.body.style.overflow = 'hidden';
    return () => {
      if (fsWatchIdRef.current != null && navigator.geolocation) { navigator.geolocation.clearWatch(fsWatchIdRef.current); fsWatchIdRef.current = null; }
      fsLocationMarkerRef.current = null;
      fsMapRef.current = null;
      setFsLocationOn(false);
      document.body.style.overflow = '';
      map.remove();
    };
  }, [fullscreen, points, mapStyle]);

  const toggleLocation = () => toggleLocationTracking(locationOn, watchIdRef, locationMarkerRef, mapRef, setLocationOn, setLocationError);
  const toggleFsLocation = () => toggleLocationTracking(fsLocationOn, fsWatchIdRef, fsLocationMarkerRef, fsMapRef, setFsLocationOn, setFsLocationError);

  if (points.length === 0) return <p style={{ fontSize: 13, color: '#8a9089', margin: '8px 0 0' }}>Could not read a route from this GPX file.</p>;
  return (
    <div>
      <div style={{ position: 'relative' }}>
        <div ref={containerRef} className="route-map"></div>
        <MapControls mapStyle={mapStyle} setMapStyle={setMapStyle} locationOn={locationOn} toggleLocation={toggleLocation}
          expandBtn={<button className="expand-btn" onClick={() => setFullscreen(true)}>⛶ Expand</button>} />
      </div>
      {locationError && <p style={{ fontSize: 12, color: 'var(--red)', margin: '6px 0 0' }}>{locationError}</p>}

      {fullscreen && (
        <div className="fullscreen-map-modal">
          <div className="fullscreen-map-header">
            <span>Route map</span>
            <button className="close-x" onClick={() => setFullscreen(false)}>×</button>
          </div>
          <div className="fullscreen-map-body">
            <div ref={fsContainerRef} className="fullscreen-map-container"></div>
            <MapControls mapStyle={mapStyle} setMapStyle={setMapStyle} locationOn={fsLocationOn} toggleLocation={toggleFsLocation} />
            {fsLocationError && <p className="fs-location-error">{fsLocationError}</p>}
          </div>
        </div>
      )}
    </div>
  );
}

function fmtDate(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString('en-GB', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function fmtDateShort(d) {
  if (!d) return "";
  const dt = new Date(d + "T00:00:00");
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}

function CompassMark() {
  return (
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none">
      <circle cx="15" cy="15" r="13" stroke="#7C9885" strokeWidth="1.4" />
      <path d="M15 5 L18 15 L15 25 L12 15 Z" fill="#C08A3E" />
      <circle cx="15" cy="15" r="2" fill="#F7F5EF" />
    </svg>
  );
}

function Toast({ text }) {
  if (!text) return null;
  return <div className="toast">{text}</div>;
}

function IdentityModal({ members, onPick }) {
  const [q, setQ] = useState('');
  const filtered = members.filter(m => m.name.toLowerCase().includes(q.trim().toLowerCase()));
  return (
    <div className="identity-modal">
      <div className="identity-card">
        <h2 style={{margin:'0 0 4px', fontSize:19}}>Which one are you?</h2>
        <p style={{margin:0, fontSize:13, color:'#5b6960'}}>So you can tick your own name. This is just remembered on this device — not a real login.</p>
        <input type="text" placeholder="Search…" value={q} onChange={e => setQ(e.target.value)} style={{marginTop:12}} />
        <div className="identity-list">
          {filtered.map(m => (
            <div className="identity-option" key={m.id} onClick={() => onPick(m.name)}>{m.name}</div>
          ))}
          {filtered.length === 0 && <div style={{padding:'10px 12px', fontSize:13.5, color:'#8a9089'}}>No match. Add yourself from the Members tab first.</div>}
        </div>
      </div>
    </div>
  );
}

function App() {
  const [loading, setLoading] = useState(true);
  const [members, setMembers] = useState([]);
  const activeMembers = useMemo(() => members.filter(m => m.active !== false), [members]);
  const [events, setEvents] = useState([]);
  const [signups, setSignups] = useState([]);
  const [selectedEventId, setSelectedEventId] = useState(null);
  const [tab, setTab] = useState('walk'); // walk | history | members
  const [search, setSearch] = useState('');
  const [showNewWalk, setShowNewWalk] = useState(false);
  const [editingWalk, setEditingWalk] = useState(false);
  const [form, setForm] = useState({
    walk_date: '', title: '', organisers: [], details: '',
    start_lat: '', start_lng: '', end_lat: '', end_lng: '',
    lunch_name: '', lunch_url: '',
    gpx_content: '', gpx_filename: '',
  });
  const [newMemberName, setNewMemberName] = useState('');
  const [newMemberEmail, setNewMemberEmail] = useState('');
  const [toast, setToast] = useState('');
  const [myName, setMyName] = useState(() => localStorage.getItem('walkgroup_identity') || '');
  const [showIdentity, setShowIdentity] = useState(false);

  // --- Trips ---
  const [trips, setTrips] = useState([]);
  const [selectedTripId, setSelectedTripId] = useState(null);
  const [tripDays, setTripDays] = useState([]);
  const [tripLevels, setTripLevels] = useState([]);
  const [tripSignups, setTripSignups] = useState([]);
  const [tripDrivers, setTripDrivers] = useState([]);
  const [tripAttendees, setTripAttendees] = useState([]);
  const [showTripForm, setShowTripForm] = useState(false);
  const [editingTrip, setEditingTrip] = useState(false);
  const [tripForm, setTripForm] = useState({ name: '', start_date: '', end_date: '', organisers: [], details: '' });
  const [editingLevelId, setEditingLevelId] = useState(null);
  const [levelForm, setLevelForm] = useState({ details: '', start_lat: '', start_lng: '', end_lat: '', end_lng: '', gpx_content: '', gpx_filename: '' });
  const [expandedDays, setExpandedDays] = useState({});
  const [expandedLevels, setExpandedLevels] = useState({});
  const toggleDay = (dayId) => setExpandedDays(prev => ({ ...prev, [dayId]: !prev[dayId] }));
  const toggleLevel = (levelId) => setExpandedLevels(prev => ({ ...prev, [levelId]: !prev[levelId] }));

  const pickIdentity = (name) => {
    localStorage.setItem('walkgroup_identity', name);
    setMyName(name);
    setShowIdentity(false);
  };

  const flashToast = (msg) => { setToast(msg); setTimeout(() => setToast(''), 1800); };

  const loadAll = useCallback(async () => {
    const [mRes, eRes] = await Promise.all([
      sb.from('walk_members').select('id,name,active,created_at').order('name'),
      sb.from('walk_events').select('*').order('walk_date', { ascending: false }),
    ]);
    if (mRes.data) setMembers(mRes.data);
    if (eRes.data) {
      setEvents(eRes.data);
      if (eRes.data.length && !selectedEventId) {
        const today = new Date().toISOString().slice(0, 10);
        const upcoming = eRes.data.filter(e => e.walk_date >= today).sort((a, b) => a.walk_date.localeCompare(b.walk_date));
        setSelectedEventId(upcoming.length ? upcoming[0].id : eRes.data[0].id);
      }
    }
    setLoading(false);
  }, [selectedEventId]);

  useEffect(() => { loadAll(); loadTrips(); }, []);

  useEffect(() => {
    if (!myName && members.length > 0 && !loading) setShowIdentity(true);
  }, [members, myName, loading]);

  const loadTrips = useCallback(async () => {
    const { data } = await sb.from('trips').select('*').order('start_date', { ascending: false });
    setTrips(data || []);
  }, []);

  const loadTripDetail = useCallback(async (tripId) => {
    if (!tripId) { setTripDays([]); setTripLevels([]); setTripSignups([]); setTripDrivers([]); setTripAttendees([]); return; }
    const { data: days } = await sb.from('trip_days').select('*').eq('trip_id', tripId).order('day_date');
    const dayList = days || [];
    setTripDays(dayList);
    const dayIds = dayList.map(d => d.id);
    const [levelsRes, signupsRes, driversRes, attendeesRes] = await Promise.all([
      dayIds.length ? sb.from('trip_day_levels').select('*').in('trip_day_id', dayIds) : Promise.resolve({ data: [] }),
      dayIds.length ? sb.from('trip_signups').select('*').in('trip_day_id', dayIds) : Promise.resolve({ data: [] }),
      sb.from('trip_drivers').select('*').eq('trip_id', tripId),
      sb.from('trip_attendees').select('*').eq('trip_id', tripId),
    ]);
    setTripLevels(levelsRes.data || []);
    setTripSignups(signupsRes.data || []);
    setTripDrivers(driversRes.data || []);
    setTripAttendees(attendeesRes.data || []);
  }, []);

  useEffect(() => { loadTripDetail(selectedTripId); }, [selectedTripId]);

  const LEVEL_ORDER = ['Easy', 'Medium', 'Hard'];
  const LEVEL_CLASS = { Easy: 'easy', Medium: 'medium', Hard: 'hard', 'Not walking': 'notwalking' };
  const LEVEL_CHIP_LABEL = { Easy: 'E', Medium: 'M', Hard: 'H', 'Not walking': '—' };

  const selectedTrip = useMemo(() => trips.find(t => t.id === selectedTripId), [trips, selectedTripId]);

  const levelsForDay = useCallback((dayId) => {
    return tripLevels
      .filter(l => l.trip_day_id === dayId)
      .sort((a, b) => LEVEL_ORDER.indexOf(a.level) - LEVEL_ORDER.indexOf(b.level));
  }, [tripLevels]);

  const tripSignupFor = useCallback((dayId, name) => tripSignups.find(s => s.trip_day_id === dayId && s.member_name === name), [tripSignups]);
  const driverFor = useCallback((name) => tripDrivers.find(d => d.member_name === name), [tripDrivers]);
  const attendeeFor = useCallback((name) => tripAttendees.find(a => a.member_name === name), [tripAttendees]);

  const goingMembers = useMemo(() => {
    return activeMembers.filter(m => { const a = attendeeFor(m.name); return a && a.going; });
  }, [activeMembers, tripAttendees]);

  const isTripOrganiser = useMemo(() => {
    if (!selectedTrip || !myName) return false;
    return (selectedTrip.organisers || []).some(o => o.trim().toLowerCase() === myName.trim().toLowerCase());
  }, [selectedTrip, myName]);

  const canEditTripPerson = useCallback((name) => {
    if (!myName) return false;
    if (name.trim().toLowerCase() === myName.trim().toLowerCase()) return true;
    return isTripOrganiser;
  }, [myName, isTripOrganiser]);

  const setDayLevelChoice = async (dayId, memberName, choice) => {
    if (!canEditTripPerson(memberName)) { flashToast(myName ? `Only ${memberName} or a trip organiser can update that` : 'Pick who you are first'); return; }
    const existing = tripSignupFor(dayId, memberName);
    const nextLevel = existing && existing.level === choice ? null : choice;
    const payload = { trip_day_id: dayId, member_name: memberName, level: nextLevel, updated_at: new Date().toISOString() };
    setTripSignups(prev => {
      const others = prev.filter(s => !(s.trip_day_id === dayId && s.member_name === memberName));
      return [...others, { ...(existing || {}), ...payload }];
    });
    await sb.from('trip_signups').upsert(payload, { onConflict: 'trip_day_id,member_name' });
  };

  const setGoing = async (memberName, value) => {
    if (!canEditTripPerson(memberName)) { flashToast(myName ? `Only ${memberName} or a trip organiser can update that` : 'Pick who you are first'); return; }
    const payload = { trip_id: selectedTripId, member_name: memberName, going: value, updated_at: new Date().toISOString() };
    setTripAttendees(prev => {
      const others = prev.filter(a => a.member_name !== memberName);
      return [...others, payload];
    });
    await sb.from('trip_attendees').upsert(payload, { onConflict: 'trip_id,member_name' });
  };

  const setDriving = async (memberName, value) => {
    if (!canEditTripPerson(memberName)) { flashToast(myName ? `Only ${memberName} or a trip organiser can update that` : 'Pick who you are first'); return; }
    const payload = { trip_id: selectedTripId, member_name: memberName, driving: value, updated_at: new Date().toISOString() };
    setTripDrivers(prev => {
      const others = prev.filter(d => d.member_name !== memberName);
      return [...others, payload];
    });
    await sb.from('trip_drivers').upsert(payload, { onConflict: 'trip_id,member_name' });
  };

  const dayCounts = useCallback((dayId) => {
    const c = { Easy: 0, Medium: 0, Hard: 0, 'Not walking': 0 };
    tripSignups.filter(s => s.trip_day_id === dayId && s.level).forEach(s => { if (c[s.level] != null) c[s.level]++; });
    return c;
  }, [tripSignups]);

  const openNewTripForm = () => {
    setTripForm({ name: '', start_date: '', end_date: '', organisers: myName ? [myName] : [], details: '' });
    setEditingTrip(false);
    setShowTripForm(true);
  };

  const openEditTripForm = () => {
    if (!selectedTrip) return;
    setTripForm({
      name: selectedTrip.name, start_date: selectedTrip.start_date, end_date: selectedTrip.end_date,
      organisers: selectedTrip.organisers || [], details: selectedTrip.details || '',
    });
    setEditingTrip(true);
    setShowTripForm(true);
  };

  const toggleTripFormOrganiser = (name) => {
    setTripForm(f => {
      const has = f.organisers.includes(name);
      return { ...f, organisers: has ? f.organisers.filter(n => n !== name) : [...f.organisers, name] };
    });
  };

  const dateRange = (startStr, endStr) => {
    const out = [];
    let d = new Date(startStr + 'T00:00:00Z');
    const end = new Date(endStr + 'T00:00:00Z');
    while (d <= end) { out.push(d.toISOString().slice(0, 10)); d.setUTCDate(d.getUTCDate() + 1); }
    return out;
  };

  const saveTripForm = async () => {
    if (!tripForm.name.trim()) { flashToast('Give the trip a name'); return; }
    if (!tripForm.start_date || !tripForm.end_date) { flashToast('Pick start and end dates'); return; }
    if (tripForm.end_date < tripForm.start_date) { flashToast('End date is before start date'); return; }

    if (editingTrip && selectedTrip) {
      const { error } = await sb.from('trips').update({
        name: tripForm.name, start_date: tripForm.start_date, end_date: tripForm.end_date,
        organisers: tripForm.organisers, details: tripForm.details, updated_at: new Date().toISOString(),
      }).eq('id', selectedTrip.id);
      if (!error) flashToast('Trip updated');
      setShowTripForm(false);
      loadTrips();
      loadTripDetail(selectedTrip.id);
      return;
    }

    const { data: trip, error } = await sb.from('trips').insert({
      name: tripForm.name, start_date: tripForm.start_date, end_date: tripForm.end_date,
      organisers: tripForm.organisers, details: tripForm.details,
    }).select().single();
    if (error || !trip) { flashToast('Could not create trip'); return; }

    const dates = dateRange(tripForm.start_date, tripForm.end_date);
    const { data: days, error: daysError } = await sb.from('trip_days')
      .insert(dates.map(d => ({ trip_id: trip.id, day_date: d })))
      .select();
    if (!daysError && days) {
      const levelRows = [];
      days.forEach(day => LEVEL_ORDER.forEach(lvl => levelRows.push({ trip_day_id: day.id, level: lvl })));
      await sb.from('trip_day_levels').insert(levelRows);
    }
    setShowTripForm(false);
    setSelectedTripId(trip.id);
    flashToast('Trip created');
    loadTrips();
  };

  const deleteTrip = async () => {
    if (!selectedTrip) return;
    if (!window.confirm(`Delete "${selectedTrip.name}"? This removes all days, routes and RSVPs for the trip.`)) return;
    await sb.from('trips').delete().eq('id', selectedTrip.id);
    setSelectedTripId(null);
    setShowTripForm(false);
    flashToast('Trip deleted');
    loadTrips();
  };

  const openEditLevel = (level) => {
    setEditingLevelId(level.id);
    setLevelForm({
      details: level.details || '',
      start_lat: level.start_lat ?? '', start_lng: level.start_lng ?? '',
      end_lat: level.end_lat ?? '', end_lng: level.end_lng ?? '',
      gpx_content: level.gpx_content || '', gpx_filename: level.gpx_filename || '',
    });
  };

  const cancelEditLevel = () => setEditingLevelId(null);

  const handleLevelGpxFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { flashToast('GPX file is too large (max 5MB)'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || '');
      const points = parseGpxPoints(text);
      if (points.length === 0) { flashToast('Could not read a route from that file'); return; }
      setLevelForm(f => ({
        ...f, gpx_content: text, gpx_filename: file.name,
        start_lat: f.start_lat === '' ? points[0].lat : f.start_lat,
        start_lng: f.start_lng === '' ? points[0].lng : f.start_lng,
        end_lat: f.end_lat === '' ? points[points.length - 1].lat : f.end_lat,
        end_lng: f.end_lng === '' ? points[points.length - 1].lng : f.end_lng,
      }));
      flashToast('Route loaded');
    };
    reader.onerror = () => flashToast('Could not read that file');
    reader.readAsText(file);
  };

  const clearLevelGpx = () => setLevelForm(f => ({ ...f, gpx_content: '', gpx_filename: '' }));

  const saveLevelForm = async (levelId) => {
    const { error } = await sb.from('trip_day_levels').update({
      details: levelForm.details,
      start_lat: num(levelForm.start_lat), start_lng: num(levelForm.start_lng),
      end_lat: num(levelForm.end_lat), end_lng: num(levelForm.end_lng),
      gpx_content: levelForm.gpx_content || null, gpx_filename: levelForm.gpx_filename || null,
      updated_at: new Date().toISOString(),
    }).eq('id', levelId);
    if (error) { flashToast('Could not save route'); return; }
    setEditingLevelId(null);
    flashToast('Route saved');
    loadTripDetail(selectedTripId);
  };

  const loadSignups = useCallback(async (eventId) => {
    if (!eventId) { setSignups([]); return; }
    const { data } = await sb.from('walk_signups').select('*').eq('event_id', eventId);
    setSignups(data || []);
  }, []);

  useEffect(() => { loadSignups(selectedEventId); }, [selectedEventId]);

  const selectedEvent = useMemo(() => events.find(e => e.id === selectedEventId), [events, selectedEventId]);

  const signupFor = useCallback((name) => signups.find(s => s.member_name === name), [signups]);

  const isOrganiserOfSelected = useMemo(() => {
    if (!selectedEvent || !myName) return false;
    const list = selectedEvent.organisers || [];
    return list.some(o => o.trim().toLowerCase() === myName.trim().toLowerCase());
  }, [selectedEvent, myName]);

  const canEditRow = useCallback((memberName) => {
    if (!myName) return false;
    if (memberName.trim().toLowerCase() === myName.trim().toLowerCase()) return true;
    return isOrganiserOfSelected;
  }, [myName, isOrganiserOfSelected]);

  const toggleFlag = async (memberName, flag) => {
    if (!canEditRow(memberName)) {
      flashToast(myName ? `Only ${memberName} or this walk's organiser can update that` : 'Pick who you are first');
      return;
    }
    const existing = signupFor(memberName);
    const nextVal = existing ? !existing[flag] : true;
    const payload = {
      event_id: selectedEventId,
      member_name: memberName,
      going_walk: existing ? existing.going_walk : false,
      going_lunch: existing ? existing.going_lunch : false,
      driving: existing ? existing.driving : false,
      updated_at: new Date().toISOString(),
    };
    payload[flag] = nextVal;
    setSignups(prev => {
      const others = prev.filter(s => s.member_name !== memberName);
      return [...others, { ...(existing || {}), ...payload }];
    });
    await sb.from('walk_signups').upsert(payload, { onConflict: 'event_id,member_name' });
  };

  const filteredMembers = useMemo(() => {
    const q = search.trim().toLowerCase();
    if (!q) return activeMembers;
    return activeMembers.filter(m => m.name.toLowerCase().includes(q));
  }, [activeMembers, search]);

  const counts = useMemo(() => {
    let walk = 0, lunch = 0, drive = 0;
    signups.forEach(s => { if (s.going_walk) walk++; if (s.going_lunch) lunch++; if (s.driving) drive++; });
    return { walk, lunch, drive };
  }, [signups]);

  const openNewWalk = () => {
    setForm({
      walk_date: '', title: '', organisers: myName ? [myName] : [], details: '',
      start_lat: '', start_lng: '', end_lat: '', end_lng: '',
      lunch_name: '', lunch_url: '',
      gpx_content: '', gpx_filename: '',
    });
    setEditingWalk(false);
    setShowNewWalk(true);
  };
  const openEditWalk = () => {
    if (!selectedEvent) return;
    setForm({
      walk_date: selectedEvent.walk_date, title: selectedEvent.title || '',
      organisers: selectedEvent.organisers || [], details: selectedEvent.details || '',
      start_lat: selectedEvent.start_lat ?? '', start_lng: selectedEvent.start_lng ?? '',
      end_lat: selectedEvent.end_lat ?? '', end_lng: selectedEvent.end_lng ?? '',
      lunch_name: selectedEvent.lunch_name || '', lunch_url: selectedEvent.lunch_url || '',
      gpx_content: selectedEvent.gpx_content || '', gpx_filename: selectedEvent.gpx_filename || '',
    });
    setEditingWalk(true);
    setShowNewWalk(true);
  };

  const handleGpxFile = (e) => {
    const file = e.target.files && e.target.files[0];
    e.target.value = '';
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { flashToast('GPX file is too large (max 5MB)'); return; }
    const reader = new FileReader();
    reader.onload = () => {
      const text = String(reader.result || '');
      const points = parseGpxPoints(text);
      if (points.length === 0) { flashToast('Could not read a route from that file'); return; }
      setForm(f => ({
        ...f,
        gpx_content: text,
        gpx_filename: file.name,
        start_lat: f.start_lat === '' ? points[0].lat : f.start_lat,
        start_lng: f.start_lng === '' ? points[0].lng : f.start_lng,
        end_lat: f.end_lat === '' ? points[points.length - 1].lat : f.end_lat,
        end_lng: f.end_lng === '' ? points[points.length - 1].lng : f.end_lng,
      }));
      flashToast('Route loaded');
    };
    reader.onerror = () => flashToast('Could not read that file');
    reader.readAsText(file);
  };

  const clearGpx = () => setForm(f => ({ ...f, gpx_content: '', gpx_filename: '' }));

  const toggleFormOrganiser = (name) => {
    setForm(f => {
      const has = f.organisers.includes(name);
      return { ...f, organisers: has ? f.organisers.filter(n => n !== name) : [...f.organisers, name] };
    });
  };

  const num = (v) => (v === '' || v === null || v === undefined ? null : parseFloat(v));

  const saveWalk = async () => {
    if (!form.walk_date) { flashToast('Pick a date first'); return; }
    const payloadBase = {
      walk_date: form.walk_date, title: form.title, organisers: form.organisers, details: form.details,
      start_lat: num(form.start_lat), start_lng: num(form.start_lng),
      end_lat: num(form.end_lat), end_lng: num(form.end_lng),
      lunch_name: form.lunch_name, lunch_url: form.lunch_url,
      gpx_content: form.gpx_content || null, gpx_filename: form.gpx_filename || null,
    };
    if (editingWalk && selectedEvent) {
      const { error } = await sb.from('walk_events').update({
        ...payloadBase, updated_at: new Date().toISOString(),
      }).eq('id', selectedEvent.id);
      if (!error) flashToast('Walk updated');
    } else {
      const { data, error } = await sb.from('walk_events').insert(payloadBase).select().single();
      if (!error && data) { setSelectedEventId(data.id); flashToast('Walk added'); }
    }
    setShowNewWalk(false);
    loadAll();
  };

  const deleteWalk = async () => {
    if (!selectedEvent) return;
    if (!window.confirm(`Delete the ${fmtDateShort(selectedEvent.walk_date)} walk? This removes everyone's RSVPs too.`)) return;
    await sb.from('walk_events').delete().eq('id', selectedEvent.id);
    setSelectedEventId(null);
    setShowNewWalk(false);
    flashToast('Walk deleted');
    loadAll();
  };

  const addMember = async () => {
    const name = newMemberName.trim();
    if (!name) return;
    const email = newMemberEmail.trim();
    const { error } = await sb.from('walk_members').insert({ name, email: email || null });
    if (error) { flashToast(error.message.includes('duplicate') ? 'Already on the list' : 'Could not add'); return; }
    setNewMemberName('');
    setNewMemberEmail('');
    flashToast('Added to the group');
    loadAll();
  };

  const removeMember = async (m) => {
    if (!window.confirm(`Remove ${m.name} from the group list?`)) return;
    await sb.from('walk_members').delete().eq('id', m.id);
    flashToast('Removed');
    loadAll();
  };

  const [editingMemberId, setEditingMemberId] = useState(null);
  const [editingMemberName, setEditingMemberName] = useState('');
  const [editingMemberEmail, setEditingMemberEmail] = useState('');

  const startEditMember = (m) => {
    setEditingMemberId(m.id);
    setEditingMemberName(m.name);
    setEditingMemberEmail('');
  };

  const cancelEditMember = () => {
    setEditingMemberId(null);
    setEditingMemberName('');
    setEditingMemberEmail('');
  };

  const renamePropagate = async (oldName, newName) => {
    // Flat text columns
    await Promise.all([
      sb.from('walk_signups').update({ member_name: newName }).eq('member_name', oldName),
      sb.from('trip_signups').update({ member_name: newName }).eq('member_name', oldName),
      sb.from('trip_drivers').update({ member_name: newName }).eq('member_name', oldName),
    ]);
    // Array columns: walk_events.organisers, trips.organisers
    const { data: waEvents } = await sb.from('walk_events').select('id,organisers').contains('organisers', [oldName]);
    if (waEvents && waEvents.length) {
      await Promise.all(waEvents.map(ev => sb.from('walk_events').update({
        organisers: Array.from(new Set((ev.organisers || []).map(o => o === oldName ? newName : o))),
      }).eq('id', ev.id)));
    }
    const { data: tripsWithOrg } = await sb.from('trips').select('id,organisers').contains('organisers', [oldName]);
    if (tripsWithOrg && tripsWithOrg.length) {
      await Promise.all(tripsWithOrg.map(t => sb.from('trips').update({
        organisers: Array.from(new Set((t.organisers || []).map(o => o === oldName ? newName : o))),
      }).eq('id', t.id)));
    }
  };

  const saveEditMember = async (m) => {
    const newName = editingMemberName.trim();
    if (!newName) { flashToast('Name can\'t be empty'); return; }
    const emailTrimmed = editingMemberEmail.trim();
    const updates = { name: newName };
    if (emailTrimmed) updates.email = emailTrimmed;
    if (newName === m.name && !emailTrimmed) { cancelEditMember(); return; }
    const { error } = await sb.from('walk_members').update(updates).eq('id', m.id);
    if (error) { flashToast(error.message.includes('duplicate') ? 'Already on the list' : 'Could not save'); return; }
    if (newName !== m.name) {
      await renamePropagate(m.name, newName);
      if (myName === m.name) { localStorage.setItem('walkgroup_identity', newName); setMyName(newName); }
    }
    cancelEditMember();
    flashToast('Saved');
    loadAll();
    loadTrips();
    loadSignups(selectedEventId);
    if (selectedTripId) loadTripDetail(selectedTripId);
  };

  if (loading) return <div className="app"><div className="loading">Loading the walk book…</div></div>;

  return (
    <div className="app">
      <div className="topbar">
        <div className="topbar-inner">
          <div className="brand">
            <CompassMark />
            <div>
              <h1>HDSG Walks</h1>
              <p>{activeMembers.length} in the group</p>
            </div>
          </div>
          <div className="tabs">
            <div className={"tab" + (tab === 'walk' ? ' active' : '')} onClick={() => setTab('walk')}>This walk</div>
            <div className={"tab" + (tab === 'trips' ? ' active' : '')} onClick={() => setTab('trips')}>Trips</div>
            <div className={"tab" + (tab === 'history' ? ' active' : '')} onClick={() => setTab('history')}>All walks</div>
            <div className={"tab" + (tab === 'members' ? ' active' : '')} onClick={() => setTab('members')}>Members</div>
          </div>
          <div className="whoami">
            <span>{myName ? <React.Fragment>Signed in as <b>{myName}</b></React.Fragment> : 'Not signed in'}</span>
            <button onClick={() => setShowIdentity(true)}>{myName ? 'Switch' : 'Pick who you are'}</button>
          </div>
        </div>
      </div>

      {showIdentity && <IdentityModal members={activeMembers} onPick={pickIdentity} />}

      {tab === 'walk' && (
        <React.Fragment>
          {events.length > 0 && (
            <div className="walk-picker">
              <select value={selectedEventId || ''} onChange={e => setSelectedEventId(e.target.value)}>
                {events.map(e => (
                  <option key={e.id} value={e.id}>
                    {fmtDateShort(e.walk_date)}{e.title ? ' — ' + e.title : ''}
                  </option>
                ))}
              </select>
              <button className="btn small secondary" onClick={openNewWalk}>+ New</button>
            </div>
          )}

          {!selectedEvent && (
            <div className="card empty">
              <div className="display">No walk on the books yet</div>
              <p>Add next month's date, route and organiser to get started.</p>
              <button className="btn full" style={{marginTop:14}} onClick={openNewWalk}>Add a walk</button>
            </div>
          )}

          {selectedEvent && !showNewWalk && (
            <React.Fragment>
              <div className="card">
                <div className="row-between">
                  <div className="eyebrow">Monthly walk</div>
                  <button className="btn small secondary" onClick={openEditWalk}>Edit</button>
                </div>
                <h2 className="walk-title">{selectedEvent.title || 'Group walk'}</h2>
                <p className="walk-date">{fmtDate(selectedEvent.walk_date)}</p>
                {selectedEvent.organisers && selectedEvent.organisers.length > 0 && (
                  <p className="walk-meta">Organised by <b>{selectedEvent.organisers.join(', ')}</b></p>
                )}
                {selectedEvent.details && <p className="walk-details">{selectedEvent.details}</p>}
                {selectedEvent.gpx_content && (
                  <div style={{marginTop:14}}>
                    <div className="eyebrow" style={{marginBottom:0}}>Route{selectedEvent.gpx_filename ? ' — ' + selectedEvent.gpx_filename : ''}</div>
                    <RouteMap gpxContent={selectedEvent.gpx_content} />
                  </div>
                )}
                {(selectedEvent.start_lat != null || selectedEvent.end_lat != null) && (
                  <div className="route-links">
                    {selectedEvent.start_lat != null && selectedEvent.start_lng != null && (
                      <a className="link-chip" target="_blank" rel="noopener noreferrer"
                        href={`https://www.google.com/maps?q=${selectedEvent.start_lat},${selectedEvent.start_lng}`}>
                        📍 Start point
                      </a>
                    )}
                    {selectedEvent.end_lat != null && selectedEvent.end_lng != null && (
                      <a className="link-chip" target="_blank" rel="noopener noreferrer"
                        href={`https://www.google.com/maps?q=${selectedEvent.end_lat},${selectedEvent.end_lng}`}>
                        🏁 End point
                      </a>
                    )}
                    {selectedEvent.start_lat != null && selectedEvent.end_lat != null && (
                      <a className="link-chip" target="_blank" rel="noopener noreferrer"
                        href={`https://www.google.com/maps/dir/?api=1&origin=${selectedEvent.start_lat},${selectedEvent.start_lng}&destination=${selectedEvent.end_lat},${selectedEvent.end_lng}`}>
                        🧭 Directions
                      </a>
                    )}
                  </div>
                )}
                {selectedEvent.lunch_name && (
                  <div className="lunch-chip">
                    🍴 Lunch: {toMapsLink(selectedEvent.lunch_url) ? (
                      <a href={toMapsLink(selectedEvent.lunch_url)} target="_blank" rel="noopener noreferrer">{selectedEvent.lunch_name}</a>
                    ) : selectedEvent.lunch_name}
                  </div>
                )}
                <div className="stat-row">
                  <div className="stat"><b>{counts.walk}</b><span>Walking</span></div>
                  <div className="stat"><b>{counts.lunch}</b><span>Lunch</span></div>
                  <div className="stat"><b>{counts.drive}</b><span>Driving</span></div>
                </div>
              </div>

              <div className="card">
                <div className="eyebrow">Who's in</div>
                <input className="search" type="text" placeholder="Find your name…" value={search} onChange={e => setSearch(e.target.value)} />
                <div className="legend">
                  <span><span className="dot" style={{background:'#1F3B2C'}}></span>Walk</span>
                  <span><span className="dot" style={{background:'#C08A3E'}}></span>Lunch</span>
                  <span><span className="dot" style={{background:'#4C6E8C'}}></span>Driving</span>
                </div>
                {filteredMembers.length === 0 && <div className="empty">No members match. Add people from the Members tab.</div>}
                {filteredMembers.map(m => {
                  const s = signupFor(m.name);
                  const editable = canEditRow(m.name);
                  return (
                    <div className={"member-row" + (editable ? '' : ' locked')} key={m.id}>
                      <div className="member-name">{m.name}{!editable && ' 🔒'}</div>
                      <div className="toggle-group">
                        <div className={"toggle" + (s && s.going_walk ? ' on' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'going_walk')} title="Walk">W</div>
                        <div className={"toggle" + (s && s.going_lunch ? ' on lunch' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'going_lunch')} title="Lunch">L</div>
                        <div className={"toggle" + (s && s.driving ? ' on drive' : '') + (editable ? '' : ' locked')} onClick={() => toggleFlag(m.name, 'driving')} title="Driving">D</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </React.Fragment>
          )}

          {showNewWalk && (
            <div className="card">
              <div className="row-between">
                <div className="eyebrow">{editingWalk ? 'Edit walk' : 'New walk'}</div>
                <button className="close-x" onClick={() => setShowNewWalk(false)}>×</button>
              </div>
              <div className="field">
                <label>Date</label>
                <input type="date" value={form.walk_date} onChange={e => setForm({ ...form, walk_date: e.target.value })} />
              </div>
              <div className="field">
                <label>Title (optional)</label>
                <input type="text" placeholder="e.g. Coastal path circuit" value={form.title} onChange={e => setForm({ ...form, title: e.target.value })} />
              </div>
              <div className="field">
                <label>Organisers</label>
                <div className="organiser-list">
                  {activeMembers.length === 0 && <p style={{fontSize:13, color:'#8a9089', margin:'6px 0'}}>Add people from the Members tab first.</p>}
                  {activeMembers.map(m => (
                    <label key={m.id} className="organiser-option">
                      <input type="checkbox" checked={form.organisers.includes(m.name)} onChange={() => toggleFormOrganiser(m.name)} />
                      {m.name}
                    </label>
                  ))}
                </div>
              </div>
              <div className="field">
                <label>Details</label>
                <textarea rows="4" placeholder="Terrain, meeting point, anything else…" value={form.details} onChange={e => setForm({ ...form, details: e.target.value })} />
              </div>

              <div className="field">
                <label>GPX route file (optional)</label>
                {form.gpx_content ? (
                  <div className="gpx-attach">
                    <span>📄 {form.gpx_filename || 'Route attached'}</span>
                    <button onClick={clearGpx}>Remove</button>
                  </div>
                ) : (
                  <input type="file" accept=".gpx" onChange={handleGpxFile} />
                )}
                <p style={{fontSize:12, color:'#8a9089', margin:'6px 0 0'}}>Upload a GPX track and everyone opening this walk will see it on a map.</p>
              </div>

              <div className="field">
                <label>Route — start &amp; end coordinates (optional)</label>
                <div className="coord-grid">
                  <input type="text" inputMode="decimal" placeholder="Start lat" value={form.start_lat} onChange={e => setForm({ ...form, start_lat: e.target.value })} />
                  <input type="text" inputMode="decimal" placeholder="Start lng" value={form.start_lng} onChange={e => setForm({ ...form, start_lng: e.target.value })} />
                  <input type="text" inputMode="decimal" placeholder="End lat" value={form.end_lat} onChange={e => setForm({ ...form, end_lat: e.target.value })} />
                  <input type="text" inputMode="decimal" placeholder="End lng" value={form.end_lng} onChange={e => setForm({ ...form, end_lng: e.target.value })} />
                </div>
                <p style={{fontSize:12, color:'#8a9089', margin:'6px 0 0'}}>Tip: long-press a spot in Google Maps to copy its coordinates.</p>
              </div>

              <div className="field">
                <label>Lunch location (optional, usually the pub)</label>
                <input type="text" placeholder="e.g. The Red Lion" value={form.lunch_name} onChange={e => setForm({ ...form, lunch_name: e.target.value })} style={{marginBottom:8}} />
                <input type="text" placeholder="Postcode, place name, or a Maps URL" value={form.lunch_url} onChange={e => setForm({ ...form, lunch_url: e.target.value })} />
              </div>
              <div className="btn-row">
                <button className="btn" onClick={saveWalk}>{editingWalk ? 'Save changes' : 'Add walk'}</button>
                <button className="btn secondary" onClick={() => setShowNewWalk(false)}>Cancel</button>
                {editingWalk && <button className="btn danger" onClick={deleteWalk}>Delete walk</button>}
              </div>
            </div>
          )}
        </React.Fragment>
      )}

      {tab === 'trips' && !selectedTripId && !showTripForm && (
        <div className="card">
          <div className="row-between">
            <div className="eyebrow">Trips</div>
            <button className="btn small secondary" onClick={openNewTripForm}>+ New trip</button>
          </div>
          {trips.length === 0 && <div className="empty">No trips yet — the annual multi-day walk lives here.</div>}
          {trips.map(t => (
            <div className="hist-item" key={t.id} onClick={() => setSelectedTripId(t.id)}>
              <h3>{t.name}</h3>
              <p>{fmtDateShort(t.start_date)} – {fmtDateShort(t.end_date)}{t.organisers && t.organisers.length > 0 ? ' · Organised by ' + t.organisers.join(', ') : ''}</p>
            </div>
          ))}
        </div>
      )}

      {tab === 'trips' && showTripForm && (
        <div className="card">
          <div className="row-between">
            <div className="eyebrow">{editingTrip ? 'Edit trip' : 'New trip'}</div>
            <button className="close-x" onClick={() => setShowTripForm(false)}>×</button>
          </div>
          <div className="field">
            <label>Name</label>
            <input type="text" placeholder="e.g. Lake District 2027" value={tripForm.name} onChange={e => setTripForm({ ...tripForm, name: e.target.value })} />
          </div>
          <div className="field">
            <label>Dates</label>
            <div className="coord-grid">
              <input type="date" value={tripForm.start_date} onChange={e => setTripForm({ ...tripForm, start_date: e.target.value })} />
              <input type="date" value={tripForm.end_date} onChange={e => setTripForm({ ...tripForm, end_date: e.target.value })} />
            </div>
            {!editingTrip && <p style={{fontSize:12, color:'#8a9089', margin:'6px 0 0'}}>Each day in this range gets Easy/Medium/Hard levels ready to fill in.</p>}
            {editingTrip && <p style={{fontSize:12, color:'#8a9089', margin:'6px 0 0'}}>Changing dates here won't add or remove days — edit days individually if the range changes.</p>}
          </div>
          <div className="field">
            <label>Organisers</label>
            <div className="organiser-list">
              {activeMembers.length === 0 && <p style={{fontSize:13, color:'#8a9089', margin:'6px 0'}}>Add people from the Members tab first.</p>}
              {activeMembers.map(m => (
                <label key={m.id} className="organiser-option">
                  <input type="checkbox" checked={tripForm.organisers.includes(m.name)} onChange={() => toggleTripFormOrganiser(m.name)} />
                  {m.name}
                </label>
              ))}
            </div>
          </div>
          <div className="field">
            <label>Details</label>
            <textarea rows="4" placeholder="Accommodation, meeting point, travel notes…" value={tripForm.details} onChange={e => setTripForm({ ...tripForm, details: e.target.value })} />
          </div>
          <div className="btn-row">
            <button className="btn" onClick={saveTripForm}>{editingTrip ? 'Save changes' : 'Create trip'}</button>
            <button className="btn secondary" onClick={() => setShowTripForm(false)}>Cancel</button>
            {editingTrip && <button className="btn danger" onClick={deleteTrip}>Delete trip</button>}
          </div>
        </div>
      )}

      {tab === 'trips' && selectedTripId && !showTripForm && selectedTrip && (
        <React.Fragment>
          <div className="card">
            <div className="row-between">
              <button className="btn small secondary" onClick={() => setSelectedTripId(null)}>← All trips</button>
              <button className="btn small secondary" onClick={openEditTripForm}>Edit</button>
            </div>
            <h2 className="walk-title">{selectedTrip.name}</h2>
            <p className="walk-date">{fmtDateShort(selectedTrip.start_date)} – {fmtDateShort(selectedTrip.end_date)}</p>
            {selectedTrip.organisers && selectedTrip.organisers.length > 0 && (
              <p className="walk-meta">Organised by <b>{selectedTrip.organisers.join(', ')}</b></p>
            )}
            {selectedTrip.details && <p className="walk-details">{selectedTrip.details}</p>}
          </div>

          <div className="card">
            <div className="eyebrow">Who's going &amp; driving</div>
            <input className="search" type="text" placeholder="Find your name…" value={search} onChange={e => setSearch(e.target.value)} />
            <div className="legend">
              <span>✓ Going</span>
              <span>🚗 Driving to/from hotel</span>
            </div>
            {filteredMembers.map(m => {
              const a = attendeeFor(m.name);
              const d = driverFor(m.name);
              const editable = canEditTripPerson(m.name);
              return (
                <div className={"member-row" + (editable ? '' : ' locked')} key={m.id}>
                  <div className="member-name">{m.name}{!editable && ' 🔒'}</div>
                  <div className="toggle-group">
                    <div className={"toggle" + (a && a.going ? ' on' : '') + (editable ? '' : ' locked')}
                      onClick={() => setGoing(m.name, !(a && a.going))} title="Going">✓</div>
                    <div className={"toggle" + (d && d.driving ? ' on' : '') + (editable ? '' : ' locked')}
                      onClick={() => setDriving(m.name, !(d && d.driving))} title="Driving">🚗</div>
                  </div>
                </div>
              );
            })}
          </div>

          {tripDays.map(day => {
            const counts = dayCounts(day.id);
            const dayOpen = !!expandedDays[day.id];
            return (
              <div className="card" key={day.id}>
                <div className="day-header" onClick={() => toggleDay(day.id)}>
                  <div>
                    <div className="eyebrow" style={{marginBottom:4}}>{fmtDate(day.day_date)}</div>
                    <div className="day-summary">
                      <span>Easy {counts.Easy}</span>
                      <span>Medium {counts.Medium}</span>
                      <span>Hard {counts.Hard}</span>
                      <span>Not walking {counts['Not walking']}</span>
                    </div>
                  </div>
                  <span className="chevron">{dayOpen ? '▾' : '▸'}</span>
                </div>

                {dayOpen && (
                  <React.Fragment>
                    {levelsForDay(day.id).map(level => {
                      const hasRoute = level.details || level.gpx_content || level.start_lat != null;
                      const levelOpen = !!expandedLevels[level.id];
                      return (
                        <div className="level-block" key={level.id}>
                          {editingLevelId === level.id ? (
                            <React.Fragment>
                              <div className="row-between">
                                <span className={"level-name " + LEVEL_CLASS[level.level]}>{level.level}</span>
                                <button className="close-x" onClick={cancelEditLevel}>×</button>
                              </div>
                              <div className="field">
                                <label>Route details</label>
                                <textarea rows="3" placeholder="Distance, terrain, meeting point…" value={levelForm.details} onChange={e => setLevelForm({ ...levelForm, details: e.target.value })} />
                              </div>
                              <div className="field">
                                <label>GPX route file (optional)</label>
                                {levelForm.gpx_content ? (
                                  <div className="gpx-attach">
                                    <span>📄 {levelForm.gpx_filename || 'Route attached'}</span>
                                    <button onClick={clearLevelGpx}>Remove</button>
                                  </div>
                                ) : (
                                  <input type="file" accept=".gpx" onChange={handleLevelGpxFile} />
                                )}
                              </div>
                              <div className="field">
                                <label>Start &amp; end coordinates (optional)</label>
                                <div className="coord-grid">
                                  <input type="text" inputMode="decimal" placeholder="Start lat" value={levelForm.start_lat} onChange={e => setLevelForm({ ...levelForm, start_lat: e.target.value })} />
                                  <input type="text" inputMode="decimal" placeholder="Start lng" value={levelForm.start_lng} onChange={e => setLevelForm({ ...levelForm, start_lng: e.target.value })} />
                                  <input type="text" inputMode="decimal" placeholder="End lat" value={levelForm.end_lat} onChange={e => setLevelForm({ ...levelForm, end_lat: e.target.value })} />
                                  <input type="text" inputMode="decimal" placeholder="End lng" value={levelForm.end_lng} onChange={e => setLevelForm({ ...levelForm, end_lng: e.target.value })} />
                                </div>
                              </div>
                              <div className="btn-row">
                                <button className="btn small" onClick={() => saveLevelForm(level.id)}>Save route</button>
                                <button className="btn small secondary" onClick={cancelEditLevel}>Cancel</button>
                              </div>
                            </React.Fragment>
                          ) : (
                            <React.Fragment>
                              <div className="level-header">
                                <div className="level-header-left" onClick={() => toggleLevel(level.id)}>
                                  <span className={"level-name " + LEVEL_CLASS[level.level]}>{level.level}</span>
                                  {!hasRoute && <span className="no-route-tag">No route yet</span>}
                                  <span className="chevron small">{levelOpen ? '▾' : '▸'}</span>
                                </div>
                                <button className="btn small secondary" onClick={() => openEditLevel(level)}>Edit</button>
                              </div>
                              {levelOpen && (
                                <div style={{marginTop:8}}>
                                  {level.details && <p className="walk-details" style={{margin:'0 0 6px'}}>{level.details}</p>}
                                  {level.gpx_content && <RouteMap gpxContent={level.gpx_content} />}
                                  {(level.start_lat != null || level.end_lat != null) && (
                                    <div className="route-links">
                                      {level.start_lat != null && level.start_lng != null && (
                                        <a className="link-chip" target="_blank" rel="noopener noreferrer"
                                          href={`https://www.google.com/maps?q=${level.start_lat},${level.start_lng}`}>📍 Start</a>
                                      )}
                                      {level.end_lat != null && level.end_lng != null && (
                                        <a className="link-chip" target="_blank" rel="noopener noreferrer"
                                          href={`https://www.google.com/maps?q=${level.end_lat},${level.end_lng}`}>🏁 End</a>
                                      )}
                                      {level.start_lat != null && level.end_lat != null && (
                                        <a className="link-chip" target="_blank" rel="noopener noreferrer"
                                          href={`https://www.google.com/maps/dir/?api=1&origin=${level.start_lat},${level.start_lng}&destination=${level.end_lat},${level.end_lng}`}>🧭 Directions</a>
                                      )}
                                    </div>
                                  )}
                                  {!hasRoute && <p style={{fontSize:12.5, color:'#8a9089', margin:'4px 0 0'}}>No route added yet.</p>}
                                </div>
                              )}
                            </React.Fragment>
                          )}
                        </div>
                      );
                    })}

                    <div className="eyebrow" style={{marginTop:16}}>Who's doing what</div>
                    {goingMembers.length === 0 && <div className="empty">No one marked as going yet.</div>}
                    {goingMembers.map(m => {
                      const s = tripSignupFor(day.id, m.name);
                      const current = s ? s.level : null;
                      const editable = canEditTripPerson(m.name);
                      return (
                        <div className={"member-row" + (editable ? '' : ' locked')} key={m.id}>
                          <div className="member-name">{m.name}{!editable && ' 🔒'}</div>
                          <div className="level-choice-group">
                            {['Easy', 'Medium', 'Hard', 'Not walking'].map(opt => (
                              <div key={opt}
                                className={"level-chip" + (current === opt ? ' active ' + LEVEL_CLASS[opt] : '') + (editable ? '' : ' locked')}
                                onClick={() => setDayLevelChoice(day.id, m.name, opt)}
                                title={opt}>
                                {LEVEL_CHIP_LABEL[opt]}
                              </div>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </React.Fragment>
                )}
              </div>
            );
          })}
        </React.Fragment>
      )}

      {tab === 'history' && (
        <div className="card">
          <div className="eyebrow">Every walk logged</div>
          {events.length === 0 && <div className="empty">Nothing logged yet.</div>}
          {events.map(e => (
            <div className="hist-item" key={e.id} onClick={() => { setSelectedEventId(e.id); setTab('walk'); }}>
              <h3>{fmtDateShort(e.walk_date)}{e.title ? ' — ' + e.title : ''}</h3>
              <p>{e.organisers && e.organisers.length > 0 ? 'Organised by ' + e.organisers.join(', ') : 'No organiser set'}</p>
            </div>
          ))}
        </div>
      )}

      {tab === 'members' && (
        <div className="card">
          <div className="eyebrow">Group list</div>
          <div className="field" style={{display:'flex', gap:8, marginTop:8, flexWrap:'wrap'}}>
            <input type="text" placeholder="Add a name…" value={newMemberName}
              onChange={e => setNewMemberName(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addMember(); }}
              style={{flex:'1 1 140px'}} />
            <input type="text" placeholder="Email (optional)" value={newMemberEmail}
              onChange={e => setNewMemberEmail(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter') addMember(); }}
              style={{flex:'1 1 160px'}} />
            <button className="btn small" onClick={addMember}>Add</button>
          </div>
          <p style={{fontSize:12, color:'#8a9089', margin:'0 0 10px'}}>Emails are stored but never shown or readable through the app — write-only, for future reminders.</p>
          {members.length === 0 && <div className="empty">No one on the list yet — add the group above.</div>}
          {members.map(m => (
            <div className="member-row" key={m.id}>
              {editingMemberId === m.id ? (
                <React.Fragment>
                  <div style={{display:'flex', flexDirection:'column', gap:6, flex:1}}>
                    <input type="text" value={editingMemberName}
                      onChange={e => setEditingMemberName(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Escape') cancelEditMember(); }}
                      autoFocus placeholder="Name" />
                    <input type="text" value={editingMemberEmail}
                      onChange={e => setEditingMemberEmail(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') saveEditMember(m); if (e.key === 'Escape') cancelEditMember(); }}
                      placeholder="Update email (optional, write-only)" />
                  </div>
                  <button className="btn small" onClick={() => saveEditMember(m)}>Save</button>
                  <button className="btn small secondary" onClick={cancelEditMember}>Cancel</button>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div className="member-name">{m.name}</div>
                  <button className="btn small secondary" onClick={() => startEditMember(m)}>Edit</button>
                  <button className="btn small danger" onClick={() => removeMember(m)}>Remove</button>
                </React.Fragment>
              )}
            </div>
          ))}
        </div>
      )}

      <Toast text={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
